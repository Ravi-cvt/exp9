name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install and Build Client
      run: |
        cd client
        npm ci
        npm run build --if-present
    
    - name: Install and Test Server
      run: |
        cd server
        npm ci
        npm test || echo "No tests; skipping"
    
    - name: Build Docker images
      run: |
        docker build -t frontend-app ./client
        docker build -t backend-app ./server
    
    - name: Lint check
      run: |
        cd client
        npm run lint || echo "Lint warnings ok"

